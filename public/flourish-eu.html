<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flourish — Secure Access</title>
<style>
:root {
  --bg: #0D0A0F;
  --bg2: #110D15;
  --pink: #FF2D7B;
  --pink-dim: rgba(255,45,123,0.12);
  --pink-border: rgba(255,45,123,0.28);
  --white: #FFFFFF;
  --muted: rgba(255,255,255,0.52);
  --border: rgba(255,255,255,0.09);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--white);
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  font-weight: 300;
  -webkit-font-smoothing: antialiased;
}

/* PIN GATE */
#pin-gate {
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(170deg, #1A0512 0%, #0D0A0F 55%);
  position: relative;
  overflow: hidden;
}
#pin-gate::before {
  content: '';
  position: absolute;
  top: 15%; right: 10%;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(255,45,123,0.06) 0%, transparent 65%);
  pointer-events: none;
}
#pin-gate::after {
  content: 'FLOURISH';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Helvetica Neue', Arial, sans-serif;
  font-size: clamp(80px, 14vw, 200px);
  font-weight: 800;
  letter-spacing: -0.05em;
  color: rgba(255,255,255,0.02);
  white-space: nowrap;
  pointer-events: none;
  user-select: none;
}
.gate-brand {
  font-family: 'Helvetica Neue', Arial, sans-serif;
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.01em;
  margin-bottom: 8px;
  position: relative;
}
.gate-brand span { color: var(--pink); }
.gate-subtitle {
  font-size: 13px;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 48px;
  position: relative;
}
.pin-box {
  position: relative;
  text-align: center;
}
.pin-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--pink);
  margin-bottom: 16px;
}
.pin-inputs {
  display: flex;
  gap: 12px;
  margin-bottom: 28px;
}
.pin-inputs input {
  width: 56px; height: 68px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--white);
  font-family: 'Helvetica Neue', Arial, sans-serif;
  font-size: 28px;
  font-weight: 700;
  text-align: center;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  -moz-appearance: textfield;
}
.pin-inputs input::-webkit-outer-spin-button,
.pin-inputs input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.pin-inputs input:focus {
  border-color: var(--pink);
  box-shadow: 0 0 0 3px var(--pink-dim);
}
.pin-inputs input.error {
  border-color: #FF4444;
  box-shadow: 0 0 0 3px rgba(255,68,68,0.15);
  animation: shake 0.4s ease;
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}
.pin-submit {
  background: var(--pink);
  color: var(--white);
  border: none;
  padding: 13px 36px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.15s;
}
.pin-submit:hover { opacity: 0.88; transform: translateY(-1px); }
.pin-submit:active { transform: translateY(0); }
.pin-error-msg {
  margin-top: 18px;
  font-size: 13px;
  color: #FF4444;
  opacity: 0;
  transition: opacity 0.3s;
}
.pin-error-msg.show { opacity: 1; }
.pin-footer {
  position: absolute;
  bottom: 32px;
  font-size: 11px;
  color: rgba(255,255,255,0.2);
  letter-spacing: 0.04em;
}

/* CONTENT FRAME */
#content-frame {
  display: none;
  width: 100%;
  height: 100vh;
  border: none;
}
</style>
</head>
<body>

<div id="pin-gate">
  <div class="gate-brand">Flourish<span>.</span></div>
  <div class="gate-subtitle">The Regulatory Moment</div>
  <div class="pin-box">
    <div class="pin-label">Enter access PIN</div>
    <div class="pin-inputs">
      <input type="number" min="0" max="9" id="p1" autofocus>
      <input type="number" min="0" max="9" id="p2">
      <input type="number" min="0" max="9" id="p3">
      <input type="number" min="0" max="9" id="p4">
    </div>
    <button class="pin-submit" onclick="checkPin()">Access</button>
    <div class="pin-error-msg" id="error-msg">Incorrect PIN. Please try again.</div>
  </div>
  <div class="pin-footer">Protected document — authorised access only</div>
</div>

<iframe id="content-frame"></iframe>

var inputs=document.querySelectorAll('.pin-inputs input');
inputs.forEach(function(inp,i){
  inp.addEventListener('input',function(){
    if(this.value.length>1) this.value=this.value.slice(-1);
    if(this.value&&i<3) inputs[i+1].focus();
    if(i===3&&this.value) checkPin();
  });
  inp.addEventListener('keydown',function(e){
    if(e.key==='Backspace'&&!this.value&&i>0){inputs[i-1].focus();inputs[i-1].value='';}
    if(e.key==='Enter') checkPin();
  });
});

function checkPin(){
  var pin='';
  inputs.forEach(function(inp){pin+=inp.value;});
  if(pin.length!==4){return;}

  var h=0;for(var i=0;i<pin.length;i++){h=((h<<5)-h)+pin.charCodeAt(i);h|=0;}

    document.getElementById('pin-gate').style.display='none';

      inputs.forEach(function(inp){inp.classList.remove('error');});
